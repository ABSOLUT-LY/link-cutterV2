<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Cutter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Шапка -->
        <header class="header">
            <h1>🔗 Link Cutter</h1>
            <p class="subtitle">Сокращай ссылки и управляй ими</p>
        </header>

        <!-- Блок пользователей -->
        <section class="card">
            <div class="card-header">
                <h2>👥 Пользователи</h2>
                <span class="badge" id="users-count">0</span>
            </div>
            <div id="users-list" class="users-grid">
                <span class="placeholder">Загрузка...</span>
            </div>
        </section>

        <!-- Управление пользователями -->
        <div class="row">
            <section class="card col">
                <h2>➕ Создать</h2>
                <div class="input-group">
                    <input type="text" id="user_id" placeholder="ID пользователя">
                    <button onclick="createUser()">Создать</button>
                </div>
            </section>
            <section class="card col">
                <h2>🗑️ Удалить</h2>
                <div class="input-group">
                    <input type="text" id="delete_user_id" placeholder="ID пользователя">
                    <button onclick="deleteUser()" class="danger">Удалить</button>
                </div>
            </section>
        </div>

        <!-- Сокращение ссылки -->
        <section class="card">
            <h2>✂️ Сократить ссылку</h2>
            <div class="input-group vertical">
                <input type="text" id="link_user" placeholder="ID пользователя">
                <div class="url-input-wrapper">
                    <input type="url" id="original_url" placeholder="Вставьте длинную ссылку">
                    <button onclick="createLink()">Сократить</button>
                </div>
            </div>
        </section>

        <!-- Управление ссылками -->
        <div class="row">
            <section class="card col">
                <h2>📋 Список ссылок</h2>
                <div class="input-group">
                    <input type="text" id="list_user" placeholder="ID пользователя">
                    <button onclick="listLinks()">Показать</button>
                </div>
            </section>
            <section class="card col">
                <h2>📊 Статистика</h2>
                <div class="input-group">
                    <input type="text" id="stats_code" placeholder="Короткий код">
                    <button onclick="getClicks()">Клики</button>
                </div>
            </section>
        </div>

        <!-- Результат -->
        <div id="result-container" class="result-container hidden">
            <div class="result-header">
                <h3>📌 Результат</h3>
                <button class="close-btn" onclick="closeResult()">✕</button>
            </div>
            <div id="result"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
